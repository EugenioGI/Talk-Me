    <script>
    function reproducir(ruta, id_pictograma) {
        // 1. Reproduce el sonido de forma normal
        const audio = new Audio(ruta);
        audio.play();

        // 2. Registra el uso en la tabla HistorialUso mediante fetch
        if (id_pictograma) {
            fetch(`registrar_uso.php?id=${id_pictograma}`)
                .then(response => response.json())
                .then(data => {
                    console.log("Uso registrado exitosamente");
                })
                .catch(error => console.error("Error al registrar uso:", error));
        }
    }
    </script>
